<div class="col-sm-4">
            <div id="homeCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    {% for img, desc in home_gallery.items() %}
                        {% if loop.first %}
                            <div class="carousel-item active"
                                 data-bs-interval="3000">
                                <img src="{{ url_for('static', filename='images/projekte/' + img) }}"
                                     class="d-block w-100" alt="...">
                                <figcaption
                                        class="figure-caption">{{ desc| safe }}</figcaption>
                            </div>
                        {% else %}
                            <div class="carousel-item" data-bs-interval="3000">
                                <img src="{{ url_for('static', filename='images/projekte/' + img) }}"
                                     class="d-block w-100" alt="...">
                                <figcaption
                                        class="figure-caption">{{ desc | safe }}</figcaption>
                            </div>
                        {% endif %}
                    {% endfor %}

                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel"
                   data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"
                          aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel"
                   data-bs-slide="next">
                    <span class="carousel-control-next-icon"
                          aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
